<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakery Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.8);
            transition: all 0.3s;
        }
        .sidebar .nav-link:hover {
            color: white;
            transform: translateX(5px);
        }
        .sidebar .nav-link.active {
            color: white;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        .main-content {
            background: #f8f9fa;
            min-height: 100vh;
        }
        .card-stats {
            border-radius: 15px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        .card-stats:hover {
            transform: translateY(-5px);
        }
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 p-0 sidebar">
                <div class="text-center py-4">
                    <h4 class="text-white">🍰 Bakery MS</h4>
                </div>
                <nav class="nav flex-column px-3">
                    <a class="nav-link py-2 {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
                        <i class="fas fa-chart-line me-2"></i> Dashboard
                    </a>
                    <a class="nav-link py-2 {% if request.endpoint == 'add_stock_page' %}active{% endif %}" href="{{ url_for('add_stock_page') }}">
                        <i class="fas fa-plus-circle me-2"></i> Add Stock
                    </a>
                    <a class="nav-link py-2 {% if request.endpoint == 'add_sales_page' %}active{% endif %}" href="{{ url_for('add_sales_page') }}">
                        <i class="fas fa-shopping-cart me-2"></i> Add Sales
                    </a>
                    <a class="nav-link py-2 {% if request.endpoint == 'add_waste_page' %}active{% endif %}" href="{{ url_for('add_waste_page') }}">
                        <i class="fas fa-trash-alt me-2"></i> Add Waste
                    </a>
                    <a class="nav-link py-2 {% if request.endpoint == 'daily_report_page' %}active{% endif %}" href="{{ url_for('daily_report_page') }}">
                        <i class="fas fa-calendar-day me-2"></i> Daily Report
                    </a>
                    <a class="nav-link py-2 {% if request.endpoint == 'monthly_report_page' %}active{% endif %}" href="{{ url_for('monthly_report_page') }}">
                        <i class="fas fa-calendar-alt me-2"></i> Monthly Report
                    </a>
                </nav>
            </div>
            
            <!-- Main Content -->
            <div class="col-md-10 main-content p-4">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
