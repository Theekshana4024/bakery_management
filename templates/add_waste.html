{% extends "base.html" %}
{% block content %}
<h2 class="mb-4"><i class="fas fa-trash-alt"></i> Record Waste</h2>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form id="wasteForm">
                    <div class="mb-3">
                        <label class="form-label">Select Item</label>
                        <select class="form-control" id="itemId" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Quantity Wasted</label>
                        <input type="number" class="form-control" id="quantity" required min="1">
                    </div>
                    <button type="submit" class="btn btn-danger">Record Waste</button>
                </form>
                <div id="message" class="mt-3"></div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>Today's Waste Records</h5>
            </div>
            <div class="card-body" id="todayWaste" style="max-height: 400px; overflow-y: auto;">
                <p class="text-muted">Loading...</p>
            </div>
        </div>
    </div>
</div>

<script>
async function loadItems() {
    const response = await fetch('/api/items');
    const items = await response.json();
    const select = document.getElementById('itemId');
    select.innerHTML = '<option value="">Select an item</option>' + 
        items.map(item => `<option value="${item.id}">${item.name} (Stock: ${item.quantity_available})</option>`).join('');
}

document.getElementById('wasteForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const data = {
        item_id: parseInt(document.getElementById('itemId').value),
        quantity: parseInt(document.getElementById('quantity').value)
    };
    
    try {
        const response = await fetch('/api/waste', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        const messageDiv = document.getElementById('message');
        
        if (response.ok) {
            messageDiv.innerHTML = `<div class="alert alert-success">✅ ${result.message}. Loss value: $${result.loss_value.toFixed(2)}</div>`;
            document.getElementById('wasteForm').reset();
            loadItems();
            loadTodayWaste();
        } else {
            messageDiv.innerHTML = `<div class="alert alert-danger">❌ ${result.error}</div>`;
        }
    } catch (error) {
        document.getElementById('message').innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
    }
});

async function loadTodayWaste() {
    try {
        const response = await fetch('/api/daily-report');
        const data = await response.json();
        const container = document.getElementById('todayWaste');
        
        if (data.waste.transactions && data.waste.transactions.length > 0) {
            container.innerHTML = `<h6>Total Loss: $${data.waste.total_loss.toFixed(2)}</h6>
                                   <table class="table table-sm mt-2">
                                    <thead><tr><th>Item</th><th>Qty</th><th>Cost/Unit</th><th>Loss</th></tr></thead><tbody>`;
            data.waste.transactions.forEach(waste => {
                container.innerHTML += `<tr>
                    <td>${waste.item_name}</td>
                    <td>${waste.quantity}</td>
                    <td>$${waste.cost_price.toFixed(2)}</td>
                    <td>$${waste.loss_value.toFixed(2)}</td>
                </tr>`;
            });
            container.innerHTML += '</tbody></table>';
        } else {
            container.innerHTML = '<p class="text-muted">No waste recorded today</p>';
        }
    } catch (error) {
        console.error('Error loading today\'s waste:', error);
    }
}

loadItems();
loadTodayWaste();
</script>
{% endblock %}
