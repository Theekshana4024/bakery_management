{% extends "base.html" %}
{% block content %}
<h2 class="mb-4"><i class="fas fa-calendar-alt"></i> Monthly Report</h2>

<div class="card mb-4">
    <div class="card-body">
        <label class="form-label">Select Month</label>
        <input type="month" id="reportMonth" class="form-control w-50">
        <button class="btn btn-primary mt-2" onclick="loadReport()">View Report</button>
    </div>
</div>

<div id="reportContent"></div>

<script>
async function loadReport() {
    const monthYear = document.getElementById('reportMonth').value;
    if (!monthYear) return;
    
    const [year, month] = monthYear.split('-');
    
    try {
        const response = await fetch(`/api/monthly-report?year=${year}&month=${month}`);
        const data = await response.json();
        
        const container = document.getElementById('reportContent');
        container.innerHTML = `
            <div class="row">
                <div class="col-md-3">
                    <div class="card bg-success text-white mb-3">
                        <div class="card-body">
                            <h5>Total Revenue</h5>
                            <h3>$${data.summary.total_revenue.toFixed(2)}</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-primary text-white mb-3">
                        <div class="card-body">
                            <h5>Total Profit</h5>
                            <h3>$${data.summary.total_profit.toFixed(2)}</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-danger text-white mb-3">
                        <div class="card-body">
                            <h5>Total Loss</h5>
                            <h3>$${data.summary.total_loss.toFixed(2)}</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card bg-info text-white mb-3">
                        <div class="card-body">
                            <h5>Net Profit</h5>
                            <h3>$${data.summary.net_profit.toFixed(2)}</h3>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5>Sales by Item</h5>
                        </div>
                        <div class="card-body">
                            <table class="table">
                                <thead><tr><th>Item</th><th>Qty Sold</th><th>Revenue</th><th>Profit</th></tr></thead>
                                <tbody>
                                    ${Object.entries(data.sales_by_item).map(([item, stats]) => `
                                        <tr>
                                            <td>${item}</td>
                                            <td>${stats.quantity_sold}</td>
                                            <td>$${stats.revenue.toFixed(2)}</td>
                                            <td>$${stats.profit.toFixed(2)}</td>
                                        </tr>
                                    `).join('')}
                                    ${Object.keys(data.sales_by_item).length === 0 ? '<tr><td colspan="4" class="text-center">No sales recorded</td></tr>' : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5>Waste by Item</h5>
                        </div>
                        <div class="card-body">
                            <table class="table">
                                <thead><tr><th>Item</th><th>Qty Wasted</th><th>Loss Value</th></tr></thead>
                                <tbody>
                                    ${Object.entries(data.waste_by_item).map(([item, stats]) => `
                                        <tr>
                                            <td>${item}</td>
                                            <td>${stats.quantity_wasted}</td>
                                            <td>$${stats.loss_value.toFixed(2)}</td>
                                        </tr>
                                    `).join('')}
                                    ${Object.keys(data.waste_by_item).length === 0 ? '<tr><td colspan="3" class="text-center">No waste recorded</td></tr>' : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card mt-3">
                <div class="card-header">
                    <h5>Current Stock Summary (Remaining Stock Per Item)</h5>
                </div>
                <div class="card-body">
                    <table class="table">
                        <thead><tr><th>Item</th><th>Quantity Available</th><th>Cost/Unit</th><th>Stock Value</th></tr></thead>
                        <tbody>
                            ${data.stock_summary.map(item => `
                                <tr>
                                    <td>${item.name}</td>
                                    <td>${item.quantity_available}</td>
                                    <td>$${item.cost_price.toFixed(2)}</td>
                                    <td>$${item.stock_value.toFixed(2)}</td>
                                </tr>
                            `).join('')}
                            ${data.stock_summary.length === 0 ? '<tr><td colspan="4" class="text-center">No items in inventory</td></tr>' : ''}
                        </tbody>
                        <tfoot>
                            <tr class="table-info">
                                <th colspan="3">Total Stock Value</th>
                                <th>$${data.total_stock_value.toFixed(2)}</th>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        `;
    } catch (error) {
        document.getElementById('reportContent').innerHTML = `<div class="alert alert-danger">Error loading report: ${error.message}</div>`;
    }
}

// Set default to current month
const now = new Date();
const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
document.getElementById('reportMonth').value = currentMonth;
loadReport();
</script>
{% endblock %}
