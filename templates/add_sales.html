{% extends "base.html" %}
{% block content %}
<h2 class="mb-4"><i class="fas fa-shopping-cart"></i> Record Sale</h2>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form id="salesForm">
                    <div class="mb-3">
                        <label class="form-label">Select Item</label>
                        <select class="form-control" id="itemId" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Quantity Sold</label>
                        <input type="number" class="form-control" id="quantity" required min="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Selling Price per Unit ($)</label>
                        <input type="number" step="0.01" class="form-control" id="sellingPrice" required min="0.01">
                    </div>
                    <button type="submit" class="btn btn-success">Record Sale</button>
                </form>
                <div id="message" class="mt-3"></div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>Today's Sales</h5>
            </div>
            <div class="card-body" id="todaySales" style="max-height: 400px; overflow-y: auto;">
                <p class="text-muted">Loading...</p>
            </div>
        </div>
    </div>
</div>

<script>
async function loadItems() {
    const response = await fetch('/api/items');
    const items = await response.json();
    const select = document.getElementById('itemId');
    select.innerHTML = '<option value="">Select an item</option>' + 
        items.map(item => `<option value="${item.id}">${item.name} (Stock: ${item.quantity_available})</option>`).join('');
}

document.getElementById('salesForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const data = {
        item_id: parseInt(document.getElementById('itemId').value),
        quantity: parseInt(document.getElementById('quantity').value),
        selling_price: parseFloat(document.getElementById('sellingPrice').value)
    };
    
    try {
        const response = await fetch('/api/sales', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        const messageDiv = document.getElementById('message');
        
        if (response.ok) {
            messageDiv.innerHTML = `<div class="alert alert-success">✅ ${result.message}. Remaining stock: ${result.remaining_stock}</div>`;
            document.getElementById('salesForm').reset();
            loadItems();
            loadTodaySales();
        } else {
            messageDiv.innerHTML = `<div class="alert alert-danger">❌ ${result.error}</div>`;
        }
    } catch (error) {
        document.getElementById('message').innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
    }
});

async function loadTodaySales() {
    try {
        const response = await fetch('/api/daily-report');
        const data = await response.json();
        const container = document.getElementById('todaySales');
        
        if (data.sales.transactions && data.sales.transactions.length > 0) {
            container.innerHTML = `<h6>Total Revenue: $${data.sales.total_revenue.toFixed(2)}</h6>
                                   <h6>Total Profit: $${data.sales.total_profit.toFixed(2)}</h6>
                                   <table class="table table-sm mt-2">
                                    <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Revenue</th><th>Profit</th></tr></thead><tbody>`;
            data.sales.transactions.forEach(sale => {
                container.innerHTML += `<tr>
                    <td>${sale.item_name}</td>
                    <td>${sale.quantity}</td>
                    <td>$${sale.selling_price.toFixed(2)}</td>
                    <td>$${sale.total_revenue.toFixed(2)}</td>
                    <td>$${sale.profit.toFixed(2)}</td>
                </tr>`;
            });
            container.innerHTML += '</tbody></table>';
        } else {
            container.innerHTML = '<p class="text-muted">No sales recorded today</p>';
        }
    } catch (error) {
        console.error('Error loading today\'s sales:', error);
    }
}

loadItems();
loadTodaySales();
</script>
{% endblock %}
