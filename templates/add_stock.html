{% extends "base.html" %}
{% block content %}
<h2 class="mb-4"><i class="fas fa-plus-circle"></i> Add Stock</h2>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form id="stockForm">
                    <div class="mb-3">
                        <label class="form-label">Item Name</label>
                        <input type="text" class="form-control" id="itemName" required placeholder="e.g., Croissant, Whole Wheat Bread">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Quantity</label>
                        <input type="number" class="form-control" id="quantity" required min="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cost Price per Unit ($)</label>
                        <input type="number" step="0.01" class="form-control" id="costPrice" required min="0.01">
                    </div>
                    <button type="submit" class="btn btn-primary">Add Stock</button>
                </form>
                <div id="message" class="mt-3"></div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>Recent Stock Additions</h5>
            </div>
            <div class="card-body" id="recentStock" style="max-height: 400px; overflow-y: auto;">
                <p class="text-muted">Loading...</p>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('stockForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const data = {
        name: document.getElementById('itemName').value,
        quantity: parseInt(document.getElementById('quantity').value),
        cost_price: parseFloat(document.getElementById('costPrice').value)
    };
    
    try {
        const response = await fetch('/api/stock', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        const messageDiv = document.getElementById('message');
        
        if (response.ok) {
            messageDiv.innerHTML = `<div class="alert alert-success">✅ ${result.message}</div>`;
            document.getElementById('stockForm').reset();
            loadRecentStock();
        } else {
            messageDiv.innerHTML = `<div class="alert alert-danger">❌ ${result.error}</div>`;
        }
    } catch (error) {
        document.getElementById('message').innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
    }
});

async function loadRecentStock() {
    try {
        const response = await fetch('/api/daily-report');
        const data = await response.json();
        const container = document.getElementById('recentStock');
        
        if (data.stock_added && data.stock_added.length > 0) {
            container.innerHTML = '<table class="table table-sm"><thead><tr><th>Item</th><th>Qty</th><th>Cost</th><th>Date</th></tr></thead><tbody>';
            data.stock_added.slice(0, 10).forEach(stock => {
                container.innerHTML += `<tr>
                    <td>${stock.item_name}</td>
                    <td>${stock.quantity}</td>
                    <td>$${stock.cost_price.toFixed(2)}</td>
                    <td>${stock.added_date}</td>
                </tr>`;
            });
            container.innerHTML += '</tbody></table>';
        } else {
            container.innerHTML = '<p class="text-muted">No stock added today</p>';
        }
    } catch (error) {
        console.error('Error loading recent stock:', error);
    }
}

loadRecentStock();
</script>
{% endblock %}
